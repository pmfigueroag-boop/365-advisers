# 365 Advisers — CI/CD Pipeline
# Triggers on push to main and pull requests
# Runs: lint → test → Docker build verification

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Backend: Lint & Test ──────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: agent-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest python-multipart

      - name: Run tests
        env:
          GOOGLE_API_KEY: test-key-ci
          AUTH_ENABLED: "false"
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite:///test.db"
        run: |
          python -m pytest tests/ -x -q --tb=short 2>&1 | tail -30
          echo "Exit code: $?"

  # ── Backend: Docker Build ────────────────────────────────────────────────
  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t 365-advisers-api:${{ github.sha }} ./agent-backend

      - name: Verify image runs
        run: |
          docker run -d --name api-test \
            -e GOOGLE_API_KEY=test \
            -e DATABASE_URL=sqlite:///test.db \
            -p 8000:8000 \
            365-advisers-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health/live || exit 1
          docker stop api-test

  # ── Frontend: Build ──────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

  # ── Full Stack Docker Compose ────────────────────────────────────────────
  integration:
    name: Full Stack Integration
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          echo "GOOGLE_API_KEY=ci-test-key" > agent-backend/.env

      - name: Build & verify compose
        run: |
          docker compose build
          echo "Docker compose build successful"
